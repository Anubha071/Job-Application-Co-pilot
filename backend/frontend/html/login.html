<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Job Co-Pilot</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 12px;">
          <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #6C63FF, #8B83FF); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.6rem; box-shadow: 0 4px 15px rgba(108,99,255,0.3);">
            🚀
          </div>
        </div>
        <h1 style="text-align: center;">Welcome Back</h1>
        <p class="auth-subtitle" style="text-align: center;">Sign in to your Job Co-Pilot account</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
          <p id="message" class="message"></p>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/static/html/register.html">Create one</a>
        </div>
      </div>
    </div>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/login.js"></script>
  </body>
</html>
